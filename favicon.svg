<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Brand gradient: indigo → cyan, 135° -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5b72ff"/>
      <stop offset="100%" stop-color="#38d9ff"/>
    </linearGradient>
    <!-- Inner glow for depth -->
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Squircle background — rx=8 matches logo-mark -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Subtle inner highlight -->
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>

  <!--
    Geometric L — two rects, pixel-grid aligned.
    Vertical bar: 5×17px at (7,7). Horizontal bar: 14×4px at (7,20).
    Crisp at 16×16 and 32×32.
  -->
  <rect x="7"  y="7"  width="5" height="17" rx="1.5" fill="#ffffff"/>
  <rect x="7"  y="20" width="14" height="4"  rx="1.5" fill="#ffffff"/>

  <!-- Accent dot — top-right, links to cyan side of gradient -->
  <circle cx="24" cy="9" r="2.5" fill="#ffffff" opacity="0.72"/>
</svg>
