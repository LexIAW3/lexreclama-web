<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Favicon B: "L" blanco sobre azul vibrante con punto azul oscuro — el acento azul del wordmark como punto focal -->
  <rect width="32" height="32" rx="7" fill="#1d4ed8"/>
  <text
    x="6" y="24"
    font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="22"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-1">L</text>
  <!-- Punto de acento — hace el favicon más único y reconocible -->
  <circle cx="24" cy="22" r="3" fill="#ffffff" opacity="0.9"/>
</svg>
