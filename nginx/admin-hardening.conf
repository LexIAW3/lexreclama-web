# Nginx hardening for LexReclama /admin
# Include this in the TLS server block that proxies to web:8080.
#
# 1) Define the admin audit log format once (http{} or server{} context).
log_format admin_audit '$time_iso8601 status=$status method=$request_method uri=$request_uri ip=$remote_addr xff="$http_x_forwarded_for" ua="$http_user_agent"';

# 2) Restrict /admin by source IP and keep an access audit trail.
location = /admin {
    # Localhost only by default; add VPN CIDRs as needed.
    allow 127.0.0.1;
    allow ::1;
    # allow 10.8.0.0/24;   # example: WireGuard/OpenVPN CIDR
    # allow 10.0.0.0/8;    # example: private office network
    deny all;

    access_log /var/log/nginx/lex_admin_access.log admin_audit;

    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For "";   # LEX-613: clear client-spoofable header
    proxy_set_header X-Real-IP $remote_addr;
}
