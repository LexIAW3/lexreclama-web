<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52" role="img" aria-label="LexReclama">
  <!-- Balance icon — Concepto B — colors #2563eb + #0a0a0a -->
  <!-- Blue vertical stem -->
  <rect x="17.5" y="8" width="3" height="36" rx="1.2" fill="#2563eb"/>
  <!-- Blue horizontal top bar -->
  <rect x="4" y="8" width="30" height="3" rx="1.2" fill="#2563eb"/>
  <!-- Dark left plate -->
  <rect x="4" y="25" width="11" height="3" rx="1.2" fill="#0a0a0a"/>
  <!-- Dark right plate -->
  <rect x="23" y="25" width="11" height="3" rx="1.2" fill="#0a0a0a"/>
  <!-- Dark base -->
  <rect x="11" y="44" width="16" height="3" rx="1.2" fill="#0a0a0a"/>

  <!-- Wordmark — Bebas Neue -->
  <text
    x="52" y="40"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    font-size="36"
    font-weight="400"
    fill="#0a0a0a"
    letter-spacing="1">LexReclama</text>
</svg>
