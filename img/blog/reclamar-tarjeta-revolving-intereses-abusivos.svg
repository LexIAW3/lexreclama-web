<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b72ff"/>
      <stop offset="100%" style="stop-color:#38d9ff"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b72ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#38d9ff;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff5264"/>
      <stop offset="100%" style="stop-color:#ff8c38"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Accent glow -->
  <ellipse cx="600" cy="280" rx="300" ry="160" fill="url(#acc2)" filter="url(#glow)"/>

  <!-- Credit card (center) -->
  <rect x="450" y="120" width="300" height="190" rx="18" fill="rgba(22,22,32,0.95)" stroke="rgba(91,114,255,0.35)" stroke-width="2"/>
  <!-- Card chip -->
  <rect x="475" y="148" width="42" height="32" rx="6" fill="rgba(91,114,255,0.25)" stroke="rgba(91,114,255,0.4)" stroke-width="1"/>
  <rect x="481" y="154" width="30" height="20" rx="3" fill="rgba(91,114,255,0.15)" stroke="rgba(91,114,255,0.3)" stroke-width="1"/>
  <!-- Card band (magnetic strip) -->
  <rect x="450" y="190" width="300" height="26" fill="rgba(255,82,100,0.12)"/>
  <!-- Card number dots -->
  <circle cx="480" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="494" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="508" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="522" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="546" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="560" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="574" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="588" cy="243" r="4" fill="rgba(255,255,255,0.2)"/>
  <!-- TAE badge on card (danger) -->
  <rect x="620" y="228" width="106" height="54" rx="8" fill="rgba(255,82,100,0.15)" stroke="#ff5264" stroke-width="1.5"/>
  <text x="673" y="249" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="700" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">TAE</text>
  <text x="673" y="268" font-family="'Space Grotesk', Arial, sans-serif" font-size="19" font-weight="900" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">&gt;20%</text>
  <!-- Card logo circles -->
  <circle cx="702" cy="155" r="18" fill="rgba(255,82,100,0.3)" stroke="rgba(255,82,100,0.4)" stroke-width="1"/>
  <circle cx="718" cy="155" r="18" fill="rgba(255,140,56,0.3)" stroke="rgba(255,140,56,0.4)" stroke-width="1"/>

  <!-- Arrow down to warning -->
  <path d="M600 312 L600 370" stroke="#ff5264" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="590,370 600,390 610,370" fill="#ff5264"/>

  <!-- Usura badge -->
  <rect x="464" y="392" width="272" height="56" rx="12" fill="rgba(255,82,100,0.12)" stroke="#ff5264" stroke-width="1.5"/>
  <text x="600" y="413" font-family="'Space Grotesk', Arial, sans-serif" font-size="15" font-weight="700" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">USURA — INTERESES ABUSIVOS</text>
  <text x="600" y="434" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">el doble del tipo medio del mercado · Ley Azcárate</text>

  <!-- Left stat card -->
  <rect x="80" y="235" width="295" height="170" rx="16" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="80" y="235" width="295" height="5" rx="3" fill="url(#danger)"/>
  <text x="227" y="300" font-family="'Space Grotesk', Arial, sans-serif" font-size="44" font-weight="900" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">&gt;20%</text>
  <text x="227" y="338" font-family="'Space Grotesk', Arial, sans-serif" font-size="14" font-weight="700" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">TAE ILEGAL</text>
  <text x="227" y="376" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">si supera el doble del tipo medio</text>

  <!-- Right stat card -->
  <rect x="825" y="235" width="295" height="170" rx="16" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="825" y="235" width="295" height="5" rx="3" fill="#00d48a"/>
  <text x="972" y="302" font-family="'Space Grotesk', Arial, sans-serif" font-size="32" font-weight="900" fill="#00d48a" text-anchor="middle" dominant-baseline="middle">TS 2020</text>
  <text x="972" y="340" font-family="'Space Grotesk', Arial, sans-serif" font-size="13" font-weight="700" fill="#00d48a" text-anchor="middle" dominant-baseline="middle">TRIBUNAL SUPREMO</text>
  <text x="972" y="376" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">declara usurarios los revolving</text>

  <!-- Title -->
  <text x="600" y="545" font-family="'Space Grotesk', Arial, sans-serif" font-size="26" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Reclamar Tarjeta Revolving con Intereses Abusivos</text>
  <text x="600" y="583" font-family="'Space Grotesk', Arial, sans-serif" font-size="15" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Calcula tu TAE y descubre cuánto puedes recuperar · LexReclama</text>
</svg>
