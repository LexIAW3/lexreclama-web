<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b72ff"/>
      <stop offset="100%" style="stop-color:#38d9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="140" y="110" width="920" height="72" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="140" y="110" width="5" height="72" rx="3" fill="url(#acc)"/><text x="178" y="135" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#5b72ff" dominant-baseline="middle">01</text><text x="600" y="135" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Defecto de notificación</text><text x="600" y="160" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">No recibiste la multa en plazo o forma legal</text><rect x="140" y="200" width="920" height="72" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="140" y="200" width="5" height="72" rx="3" fill="url(#acc)"/><text x="178" y="225" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#5b72ff" dominant-baseline="middle">02</text><text x="600" y="225" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Falta de señalización</text><text x="600" y="250" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">La señal no era visible o no existía</text><rect x="140" y="290" width="920" height="72" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="140" y="290" width="5" height="72" rx="3" fill="url(#acc)"/><text x="178" y="315" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#5b72ff" dominant-baseline="middle">03</text><text x="600" y="315" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Prescripción</text><text x="600" y="340" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Han pasado más de 3/6 meses sin notificarte</text><rect x="140" y="380" width="920" height="72" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="140" y="380" width="5" height="72" rx="3" fill="url(#acc)"/><text x="178" y="405" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#5b72ff" dominant-baseline="middle">04</text><text x="600" y="405" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Error en los datos</text><text x="600" y="430" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Matrícula, conductor o infracción incorrectos</text><rect x="140" y="470" width="920" height="72" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="140" y="470" width="5" height="72" rx="3" fill="url(#acc)"/><text x="178" y="495" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#5b72ff" dominant-baseline="middle">05</text><text x="600" y="495" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Falta de motivación</text><text x="600" y="520" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">La resolución no explica los hechos probados</text><text x="600" y="580" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Motivos Válidos para Recurrir una Multa</text>
</svg>