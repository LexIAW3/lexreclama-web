<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b72ff"/>
      <stop offset="100%" style="stop-color:#38d9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="290" y="90" width="620" height="430" rx="16" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="290" y="90" width="620" height="5" rx="3" fill="url(#acc)"/><text x="600" y="126" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#5b72ff" text-anchor="middle" dominant-baseline="middle">RECURSO DE REPOSICIÓN</text><text x="600" y="152" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">(Art. 108 Ley 39/2015 — Procedimiento Administrativo Común)</text><line x1="310" y1="170" x2="890" y2="170" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="310" y="186" width="580" height="20" rx="4" fill="rgba(91,114,255,0.06)"/><text x="320" y="196" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#5b72ff" text-anchor="start" dominant-baseline="middle">DATOS DEL RECURRENTE</text><text x="330" y="222" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Nombre y apellidos:</text><rect x="330" y="230" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="252" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">DNI/NIF:</text><rect x="330" y="260" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="282" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Domicilio a efectos de notificaciones:</text><rect x="330" y="290" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><rect x="310" y="308" width="580" height="20" rx="4" fill="rgba(91,114,255,0.06)"/><text x="320" y="318" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#5b72ff" text-anchor="start" dominant-baseline="middle">OBJETO DE LA RESOLUCIÓN</text><text x="330" y="344" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Nº expediente:</text><rect x="330" y="352" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="374" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Fecha notificación:</text><rect x="330" y="382" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="404" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Infracción imputada:</text><rect x="330" y="412" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><rect x="310" y="430" width="580" height="20" rx="4" fill="rgba(91,114,255,0.06)"/><text x="320" y="440" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#5b72ff" text-anchor="start" dominant-baseline="middle">MOTIVOS DEL RECURSO</text><text x="330" y="466" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Alego lo siguiente:</text><rect x="330" y="474" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="496" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">(defecto, prescripción, señalización...)</text><rect x="330" y="504" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><rect x="310" y="530" width="580" height="20" rx="4" fill="rgba(91,114,255,0.06)"/><text x="320" y="540" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#5b72ff" text-anchor="start" dominant-baseline="middle">SUPLICO</text><text x="330" y="566" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Se anule la resolución impugnada</text><rect x="330" y="574" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="330" y="596" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">y se archive el expediente.</text><rect x="330" y="604" width="540" height="7" rx="3" fill="rgba(255,255,255,0.05)"/><text x="600" y="582" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Formulario de Recurso de Reposición</text>
</svg>