  <line x1="330" y1="200" x2="870" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="380" y="228" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="normal" fill="#9292a8" text-anchor="start" dominant-baseline="middle">Expediente nº:</text>
