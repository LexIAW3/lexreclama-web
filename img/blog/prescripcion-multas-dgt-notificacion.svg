  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <rect x="310" y="120" width="580" height="380" rx="20" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
