<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b72ff"/>
      <stop offset="100%" style="stop-color:#38d9ff"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b72ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#38d9ff;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Accent glow blob -->
  <ellipse cx="600" cy="315" rx="320" ry="180" fill="url(#acc2)" filter="url(#glow)"/>
  
  <!-- Fine notice card -->
  <rect x="200" y="120" width="360" height="300" rx="16" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="200" y="120" width="360" height="5" rx="3" fill="#ff5264"/>
  <!-- DGT header -->
  <rect x="200" y="125" width="360" height="50" fill="rgba(255,82,100,0.08)"/>
  <text x="380" y="150" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="900" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">D.G.T.</text>
  <text x="380" y="168" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">DENUNCIA DE TRÁFICO</text>
  <!-- Fine content lines -->
  <rect x="225" y="190" width="200" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="225" y="210" width="280" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="225" y="230" width="240" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Amount -->
  <rect x="225" y="255" width="310" height="44" rx="8" fill="rgba(255,82,100,0.1)" stroke="rgba(255,82,100,0.2)" stroke-width="1"/>
  <text x="380" y="277" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">IMPORTE: 500 €</text>
  <!-- Arrow pointing right -->
  <path d="M570 270 L650 270" stroke="url(#acc)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="650,258 680,270 650,282" fill="#5b72ff"/>
  <!-- Response card -->
  <rect x="690" y="160" width="320" height="220" rx="16" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="690" y="160" width="320" height="5" rx="3" fill="url(#acc)"/>
  <text x="850" y="194" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700" fill="#5b72ff" text-anchor="middle" dominant-baseline="middle">TU RECURSO</text>
  <!-- Arguments list -->
  <circle cx="715" cy="228" r="5" fill="url(#acc)" opacity="0.7"/>
  <rect x="728" y="222" width="258" height="10" rx="3" fill="rgba(255,255,255,0.07)"/><circle cx="715" cy="260" r="5" fill="url(#acc)" opacity="0.7"/>
  <rect x="728" y="254" width="238" height="10" rx="3" fill="rgba(255,255,255,0.07)"/><circle cx="715" cy="292" r="5" fill="url(#acc)" opacity="0.7"/>
  <rect x="728" y="286" width="218" height="10" rx="3" fill="rgba(255,255,255,0.07)"/><circle cx="715" cy="324" r="5" fill="url(#acc)" opacity="0.7"/>
  <rect x="728" y="318" width="198" height="10" rx="3" fill="rgba(255,255,255,0.07)"/>
  <!-- Win badge -->
  <rect x="705" y="335" width="290" height="34" rx="8" fill="rgba(0,212,138,0.12)" stroke="#00d48a" stroke-width="1.5"/>
  <text x="850" y="352" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700" fill="#00d48a" text-anchor="middle" dominant-baseline="middle">SANCIÓN ANULADA ✓</text>
  <!-- Title -->
  <text x="600" y="548" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">Cómo Recurrir una Multa de la DGT</text>
  <text x="600" y="582" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Motivos válidos, plazos y formulario oficial paso a paso</text>

</svg>