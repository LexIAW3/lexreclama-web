<circle cx="200" cy="320" r="12" fill="#ff5264" opacity="0.9"/><text x="200" y="278" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#ff5264" text-anchor="middle" dominant-baseline="middle">INFRACCIÓN</text><text x="200" y="358" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Día 0</text><circle cx="420" cy="320" r="12" fill="#9292a8" opacity="0.9"/><text x="420" y="278" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">NOTIFICACIÓN</text><text x="420" y="358" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">≤ 3 meses</text><circle cx="640" cy="320" r="12" fill="#5b72ff" opacity="0.9"/><text x="640" y="278" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#5b72ff" text-anchor="middle" dominant-baseline="middle">ALEGACIONES</text><text x="640" y="358" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">10 días hábiles</text><circle cx="820" cy="320" r="12" fill="#38d9ff" opacity="0.9"/><text x="820" y="278" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#38d9ff" text-anchor="middle" dominant-baseline="middle">RESOLUCIÓN</text><text x="820" y="358" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">≤ 1 año</text><circle cx="1000" cy="320" r="12" fill="#00d48a" opacity="0.9"/><text x="1000" y="278" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#00d48a" text-anchor="middle" dominant-baseline="middle">PRESCRIPCIÓN</text><text x="1000" y="358" font-family="'Space Grotesk', sans-serif" font-size="1