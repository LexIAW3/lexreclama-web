<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b72ff"/>
      <stop offset="100%" style="stop-color:#38d9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Building silhouette -->
  <rect x="440" y="150" width="320" height="280" rx="4" fill="rgba(22,22,32,0.95)" stroke="rgba(91,114,255,0.15)" stroke-width="1"/>
  <!-- Columns -->
  <rect x="458" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/><rect x="504" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/><rect x="550" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/><rect x="596" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/><rect x="642" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/><rect x="688" y="180" width="18" height="220" rx="4" fill="rgba(91,114,255,0.12)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/>
  <!-- Pediment -->
  <polygon points="420,180 600,110 780,180" fill="rgba(22,22,32,0.95)" stroke="rgba(91,114,255,0.25)" stroke-width="1.5"/>
  <!-- Frieze -->
  <rect x="430" y="400" width="340" height="30" rx="4" fill="rgba(91,114,255,0.1)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/>
  <text x="600" y="415" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700" fill="#5b72ff" text-anchor="middle" dominant-baseline="middle">JUZGADO</text>
  <!-- Steps -->
  <rect x="440" y="430" width="320" height="20" rx="2" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="415" y="450" width="370" height="20" rx="2" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><rect x="390" y="470" width="420" height="20" rx="2" fill="rgba(22,22,32,0.95)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Scales icon on pediment -->
  <circle cx="600" cy="143" r="18" fill="url(#acc)" opacity="0.2"/>
  <text x="600" y="143" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#5b72ff" text-anchor="middle" dominant-baseline="middle">⚖</text>
  <!-- Badge -->
  <rect x="350" y="515" width="500" height="50" rx="10" fill="rgba(22,22,32,0.95)" stroke="rgba(91,114,255,0.2)" stroke-width="1"/>
  <text x="600" y="540" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="normal" fill="#9292a8" text-anchor="middle" dominant-baseline="middle">Sin tasas · Sin costes previos · Solo pagas si ganas</text>
  <text x="600" y="600" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#eeeef2" text-anchor="middle" dominant-baseline="middle">El Juzgado a tu Favor</text>

</svg>