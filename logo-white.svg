<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44" role="img" aria-label="LexReclama">
  <defs>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#5b72ff"/>
      <stop offset="100%" stop-color="#38d9ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Icon mark — 36×36, gradient squircle -->
  <rect x="0" y="4" width="36" height="36" rx="9" fill="url(#grd)"/>
  <rect x="0" y="4" width="36" height="36" rx="9" fill="url(#glow)"/>
  <!-- L mark: vertical bar -->
  <rect x="8"  y="10" width="5.5" height="20" rx="1.5" fill="#ffffff"/>
  <!-- L mark: horizontal bar -->
  <rect x="8"  y="26" width="15"  height="4.5" rx="1.5" fill="#ffffff"/>
  <!-- Accent dot -->
  <circle cx="29" cy="13" r="2.5" fill="#ffffff" opacity="0.75"/>

  <!-- Wordmark — white text for dark backgrounds -->
  <text
    x="48" y="30"
    font-family="'Space Grotesk','Manrope',system-ui,-apple-system,sans-serif"
    font-size="22"
    font-weight="600"
    fill="#eeeef2"
    letter-spacing="-0.4">LexReclama</text>
</svg>
